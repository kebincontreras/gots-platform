name: Weekly News Email

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Modo de envio"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - test
          - send

jobs:
  send-weekly-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Send weekly email
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          RECIPIENTS: ${{ secrets.RECIPIENTS }}
          TEST_RECIPIENT: ${{ secrets.SMTP_USER }}
          SEND_MODE: ${{ github.event.inputs.mode }}
          FROM_NAME: GOTS Research Group
          NEWS_URL: https://gotsresearchgroup-beep.github.io/GOTS.github.io/noticias
        run: python scripts/send_weekly_news.py
